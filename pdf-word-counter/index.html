<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Word Counter – Free Online Tool</title>
<meta name="description" content="Upload a PDF and instantly count words, characters, and pages.">

<link rel="stylesheet" href="style.css">

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- AdSense placeholder -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>

</head>

<body>

<header>
<h1>PDF Word Counter</h1>
<p>Upload a PDF to count words instantly</p>
</header>

<div class="container">

<div class="upload">
<input type="file" id="pdfUpload" accept="application/pdf">
</div>

<div class="results">

<div class="card">
<h2 id="words">0</h2>
<p>Words</p>
</div>

<div class="card">
<h2 id="characters">0</h2>
<p>Characters</p>
</div>

<div class="card">
<h2 id="pages">0</h2>
<p>Pages</p>
</div>

</div>

<!-- Ad placement -->
<div class="ad">
Ad Space
</div>

</div>

<footer>
<p>Free PDF Tools</p>
</footer>

<script src="script.js"></script>

</body>
</html>
